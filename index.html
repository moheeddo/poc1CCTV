<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CCTV 배치 시뮬레이터</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1420;color:#e2e8f0;height:100vh;overflow:hidden;display:flex}

.side{width:260px;min-width:260px;background:#161d2e;border-right:1px solid #2a3550;display:flex;flex-direction:column;overflow-y:auto}
.side::-webkit-scrollbar{width:4px}.side::-webkit-scrollbar-thumb{background:#2a3550;border-radius:2px}
.logo{padding:12px 14px;border-bottom:1px solid #2a3550;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec{padding:10px 14px;border-bottom:1px solid #1e2940}
.sec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;margin-bottom:8px}
.score-big{font-size:32px;font-weight:800;text-align:center;padding:4px 0;letter-spacing:-1px}
.score-row{display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;padding:2px 0}
.score-row .val{font-weight:600;color:#e2e8f0}
.bar-wrap{height:3px;background:#1e293b;border-radius:2px;margin-top:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}
.cam-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#1a2236;border:1px solid #2a3550;border-radius:5px;margin-bottom:3px;cursor:pointer;transition:border-color .15s;font-size:10px}
.cam-item:hover,.cam-item.sel{border-color:#3b82f6}
.cam-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cam-info{flex:1}.cam-info small{color:#64748b;font-size:9px}
.cam-del{background:none;border:none;color:#475569;cursor:pointer;font-size:13px;padding:2px}.cam-del:hover{color:#ef4444}
.ctrl-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ctrl-row label{font-size:9px;color:#94a3b8;width:36px;flex-shrink:0}
.ctrl-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:#2a3550;border-radius:2px;outline:none}
.ctrl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#3b82f6;border-radius:50%;cursor:pointer}
.ctrl-row .val{font-size:9px;color:#e2e8f0;width:36px;text-align:right}
.btn{width:100%;padding:7px;border:none;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn:hover{opacity:.85}
.btn-primary{background:#3b82f6;color:#fff}
.btn-outline{background:transparent;border:1px dashed #2a3550;color:#94a3b8;margin-top:3px}
.btn-outline:hover{border-color:#3b82f6;color:#3b82f6}
.op-row{display:flex;align-items:center;gap:5px;font-size:10px;padding:2px 0}
.op-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.op-name{width:32px;font-weight:600}
.op-status{flex:1;text-align:right;font-size:9px}

/* 메인 영역 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.view-tabs{display:flex;background:#161d2e;border-bottom:1px solid #2a3550;padding:0 8px;flex-shrink:0}
.vtab{padding:7px 14px;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.vtab.on{color:#3b82f6;border-bottom-color:#3b82f6}
.view-area{flex:1;display:flex;position:relative;overflow:hidden}
.pane-2d{position:relative;overflow:hidden;min-width:0;min-height:0}
.pane-3d{position:relative;overflow:hidden;border-left:1px solid #2a3550;min-width:0;min-height:0}
.pane-2d canvas{display:block;width:100%;height:100%}
.hint{position:absolute;bottom:8px;left:8px;font-size:9px;color:#475569;pointer-events:none}
.toggle-bar{position:absolute;top:8px;left:8px;display:flex;gap:3px;z-index:5}
.tog{padding:3px 8px;background:rgba(15,20,32,.9);border:1px solid #2a3550;color:#64748b;border-radius:10px;cursor:pointer;font-size:9px;font-family:inherit;transition:all .15s}
.tog.on{border-color:#3b82f6;color:#3b82f6}
.playbar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;background:rgba(15,20,32,.92);border:1px solid #2a3550;border-radius:8px;padding:4px 10px;z-index:6}
.playbar button{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:2px 4px;font-family:inherit;line-height:1}
.playbar button:hover{color:#3b82f6}
.playbar button.active{color:#3b82f6}
.playbar .ptime{font-size:9px;color:#64748b;min-width:32px;text-align:center}
.playbar input[type=range]{width:100px;height:3px;-webkit-appearance:none;background:#2a3550;border-radius:2px;outline:none}
.playbar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:#3b82f6;border-radius:50%;cursor:pointer}
.trail-dot{position:absolute;width:3px;height:3px;border-radius:50%;pointer-events:none}
.cbtn{padding:4px 10px;background:transparent;border:1px solid #2a3550;color:#94a3b8;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .15s}
.cbtn:hover{border-color:#3b82f6;color:#3b82f6}
.cbtn.on{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* 모바일 사이드바 토글 */
.side-toggle{display:none;position:fixed;top:8px;left:8px;z-index:100;width:36px;height:36px;background:#161d2e;border:1px solid #2a3550;border-radius:8px;color:#e2e8f0;font-size:18px;cursor:pointer;align-items:center;justify-content:center;line-height:1}
.side-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:49}

@media(max-width:768px){
  body{flex-direction:column}
  .side{display:none;position:fixed;top:0;left:0;width:280px;height:100vh;z-index:50;overflow-y:auto}
  .side.open{display:flex}
  .side-toggle{display:flex}
  .side-overlay.open{display:block}
  .main{flex:1;min-height:0}
  .view-area{flex-direction:column}
  .pane-2d{min-height:50vh}
  .pane-3d{border-left:none;border-top:1px solid #2a3550;min-height:50vh}
  .view-tabs{padding-left:44px}
  .toggle-bar{top:4px;left:4px}
  .tog{padding:2px 6px;font-size:8px}
  .hint{display:none}
  .logo{padding:10px 14px;padding-right:40px}
}
</style>
</head>
<body>

<button class="side-toggle" id="sideToggle" onclick="toggleSide()">☰</button>
<div class="side-overlay" id="sideOverlay" onclick="toggleSide()"></div>
<div class="side" id="sidePanel">
  <div class="logo">📹 CCTV 배치 시뮬레이터</div>
  <div class="sec">
    <div class="sec-title">커버리지</div>
    <div class="score-big" id="totalScore">0%</div>
    <div class="score-row"><span>운전원 포착</span><span class="val" id="sOp">0%</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="bOp" style="width:0;background:#06b6d4"></div></div>
    <div class="score-row" style="margin-top:4px"><span>공간 커버리지</span><span class="val" id="sGrid">0%</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="bGrid" style="width:0;background:#3b82f6"></div></div>
    <div class="score-row" style="margin-top:4px"><span>제스처 감지</span><span class="val" id="sFace">0%</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="bFace" style="width:0;background:#10b981"></div></div>
  </div>
  <div class="sec">
    <div class="sec-title">운전원</div>
    <div id="opList"></div>
  </div>
  <div class="sec">
    <div class="sec-title">카메라 (<span id="camCount">0</span>)</div>
    <div id="camList"></div>
    <button class="btn btn-outline" onclick="addCam()">+ 카메라 추가</button>
  </div>
  <div class="sec" id="ctrlSec" style="display:none">
    <div class="sec-title">카메라 설정</div>
    <div class="ctrl-row"><label>모델</label><select id="rModel" onchange="setModel(this.value)" style="flex:1;background:#1a2236;color:#e2e8f0;border:1px solid #2a3550;border-radius:3px;font-size:9px;padding:2px 4px;font-family:inherit"></select></div>
    <div class="ctrl-row"><label>방향</label><input type="range" min="0" max="359" id="rAngle" oninput="setProp('angle',+this.value)"><span class="val" id="vAngle">0°</span></div>
    <div class="ctrl-row"><label>틸트</label><input type="range" min="-80" max="0" id="rTilt" oninput="setProp('tilt',+this.value)"><span class="val" id="vTilt">-30°</span></div>
    <div class="ctrl-row"><label>줌</label><input type="range" min="0" max="100" id="rZoom" oninput="setZoom(+this.value/100)"><span class="val" id="vZoom">Wide</span></div>
    <div class="ctrl-row"><label>높이</label><input type="range" min="20" max="40" id="rHeight" oninput="setProp('height',this.value/10)"><span class="val" id="vHeight">3.0m</span></div>
    <div class="ctrl-row" style="padding:1px 0;font-size:8px;color:#475569"><label></label><span id="vSpec" style="flex:1;text-align:center">H:103.9° V:57.1° R:12.5m 8MP</span></div>
    <button class="btn btn-outline" onclick="showPov()" style="margin-top:4px;border-color:#3b82f6;color:#3b82f6">POV 시점 보기</button>
  </div>
  <div class="sec">
    <div class="sec-title">자동 배치</div>
    <div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap" id="camNumBtns">
      <button class="cbtn on" onclick="setCamNum(4)">4대</button>
      <button class="cbtn" onclick="setCamNum(5)">5대</button>
      <button class="cbtn" onclick="setCamNum(6)">6대</button>
      <button class="cbtn" onclick="setCamNum(7)">7대</button>
      <button class="cbtn" onclick="setCamNum(8)">8대</button>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap" id="camTypeBtns">
      <button class="cbtn on" data-t="mix" onclick="setCamType('mix')">혼합</button>
      <button class="cbtn" data-t="fisheye" onclick="setCamType('fisheye')">어안만</button>
      <button class="cbtn" data-t="fixed" onclick="setCamType('fixed')">고정만</button>
    </div>
    <button class="btn btn-primary" onclick="autoPlace()">최적 위치 자동 배치</button>
    <div id="optStatus" style="font-size:9px;color:#64748b;margin-top:4px;text-align:center"></div>
  </div>
</div>

<div class="main">
  <div class="view-tabs">
    <button class="vtab on" id="tabSplit" onclick="setView('split')">2D + 3D</button>
    <button class="vtab" id="tab2d" onclick="setView('2d')">2D</button>
    <button class="vtab" id="tab3d" onclick="setView('3d')">3D</button>
  </div>
  <div class="view-area" id="viewArea">
    <div class="pane-2d" id="pane2d">
      <canvas id="cv"></canvas>
      <div class="toggle-bar">
        <button class="tog on" id="togHeat" onclick="toggleVis('heat')">히트맵</button>
        <button class="tog on" id="togDead" onclick="toggleVis('dead')">사각지대</button>
        <button class="tog" id="togOps" onclick="toggleVis('ops')">동선</button>
      </div>
      <div class="playbar" id="playbar">
        <button onclick="playToggle()" id="playBtn">▶</button>
        <input type="range" min="0" max="1000" value="0" id="playSlider" oninput="playSeek(+this.value/1000)">
        <span class="ptime" id="playTime">0:00</span>
        <button onclick="playSpeed()" id="playSpd" style="font-size:9px">1x</button>
      </div>
      <div class="hint">더블클릭: 추가 · 드래그: 이동 · 우클릭: 방향</div>
    </div>
    <div class="pane-3d" id="pane3d"><iframe id="f3d" src="3d.html" style="width:100%;height:100%;border:none"></iframe></div>
  </div>
</div>

<!-- 2D 로직 -->
<script>
var ROOM={W:9,H:13,CEIL:4};
var BOARDS=[
  {t:'rect',x:1.6,y:0.1,w:5.8,h:1.4,label:'전면 보드',cat:'board'},
  {t:'rect',x:0,y:0.1,w:1.6,h:2.0,label:'좌측 꺾임',cat:'board'},
  {t:'rect',x:7.4,y:0.1,w:1.6,h:2.0,label:'우측 꺾임',cat:'board'},
  {t:'rect',x:0,y:0.1,w:0.55,h:12.9,label:'좌벽',cat:'board'},
  {t:'rect',x:8.45,y:0.1,w:0.55,h:12.9,label:'우벽',cat:'board'},
  {t:'rect',x:1.8,y:3.8,w:5.4,h:0.7,label:'전면 콘솔',cat:'desk'},
  {t:'rect',x:1.5,y:4.5,w:2.0,h:3.0,label:'좌측 운전석',cat:'desk'},
  {t:'rect',x:5.5,y:4.5,w:2.0,h:3.0,label:'우측 운전석',cat:'desk'},
  {t:'rect',x:3.5,y:4.5,w:2.0,h:1.5,label:'중앙 콘솔',cat:'desk'},
  {t:'rect',x:2.0,y:8.2,w:5.0,h:0.6,label:'후면 콘솔',cat:'desk'},
  {t:'rect',x:2.0,y:9.0,w:2.0,h:1.4,label:'STA 데스크',cat:'desk'},
  {t:'rect',x:5.0,y:9.0,w:2.0,h:1.4,label:'SS 데스크',cat:'desk'}
];
// 영상 동선 분석 (2026-02-13 훈련 63분, 배경차분 8123회 감지)
// 보드(y=0.1~2.0) 바로 앞(y=1.5~3.0)에서 좌우로 격렬하게 왕복
// 좌측 보드: RO/TO 담당, 우측 보드: EO/FM 담당
var OPS=[
  {id:'RO',lbl:'원자로',x:2.5,y:5.5,col:'#3b82f6',path:[
    [2.5,5.5],[2.0,2.5],[1.6,2.0],[1.2,1.8],[0.8,2.0],[1.6,2.5],[2.5,2.0],[3.3,1.8],[2.9,2.5],[2.0,2.0],[1.2,2.5],[2.0,3.5],[2.5,5.5]]},
  {id:'TO',lbl:'터빈',x:2.5,y:6.5,col:'#8b5cf6',path:[
    [2.5,6.5],[1.6,2.5],[1.2,2.0],[0.8,1.8],[1.2,2.5],[2.0,2.0],[2.9,2.5],[2.5,2.0],[1.6,2.5],[1.6,3.5],[2.5,6.5]]},
  {id:'EO',lbl:'전기',x:6.5,y:5.5,col:'#06b6d4',path:[
    [6.5,5.5],[6.7,2.5],[7.1,2.0],[7.5,1.8],[7.9,2.0],[8.2,2.5],[7.5,2.0],[7.1,2.5],[6.3,2.0],[6.7,2.5],[6.7,3.5],[6.5,5.5]]},
  {id:'FM',lbl:'기계',x:6.5,y:6.3,col:'#ec4899',path:[
    [6.5,6.3],[5.8,2.5],[5.0,2.0],[4.5,2.5],[5.0,2.0],[5.8,2.5],[6.7,2.0],[7.1,2.5],[7.5,2.0],[6.7,2.5],[6.0,3.5],[6.5,6.3]]},
  {id:'STA',lbl:'기술',x:3.0,y:9.8,col:'#f59e0b',path:[
    [3.0,9.8],[3.5,3.5],[4.0,2.5],[5.0,2.0],[3.5,2.0],[2.5,2.5],[3.5,2.0],[4.5,2.5],[3.5,3.5],[3.0,9.8]]},
  {id:'SS',lbl:'발전부장',x:6.0,y:9.8,col:'#10b981',path:[
    [6.0,9.8],[6.0,8.1],[5.0,2.5],[4.5,2.0],[5.5,2.5],[6.0,8.1],[6.0,9.8]]}
];
var cams=[],nextId=1,selId=null,vis={heat:true,dead:true,ops:false},drag=null,hcache=null;
var curView='split';
var CAM_TYPES={fisheye:{lbl:'어안',col:'#06b6d4'},fixed:{lbl:'고정',col:'#3b82f6'},ptz:{lbl:'PTZ',col:'#8b5cf6'}};

// 카메라 스펙 프리셋
var CAM_SPECS={
  'INI-BN804TI':{label:'INI-BN804TI (8MP Bullet)',sensor:'1/1.8"',resW:3840,resH:2160,res:8,
    hfov:[103.9,26],vfov:[57.1,14.3],focal:[4.1,16.4],irRange:50,zoomRatio:4},
  'generic-fixed':{label:'일반 고정 (4MP)',sensor:'1/3"',resW:2560,resH:1440,res:4,
    hfov:[90,90],vfov:[50,50],focal:[3.6,3.6],irRange:30,zoomRatio:1},
  'generic-ptz':{label:'일반 PTZ (4MP)',sensor:'1/3"',resW:2560,resH:1440,res:4,
    hfov:[60,3],vfov:[34,1.7],focal:[4.3,129],irRange:150,zoomRatio:30},
  'fisheye-12MP':{label:'어안 12MP',sensor:'1/1.7"',resW:4000,resH:3000,res:5,
    hfov:[190,190],vfov:[190,190],focal:[1.05,1.05],irRange:15,zoomRatio:1}
};

function applySpec(c){
  var spec=CAM_SPECS[c.model||'generic-fixed'];if(!spec)return;
  var z=c.zoom||0;
  c.fov=spec.hfov[0]+(spec.hfov[1]-spec.hfov[0])*z;
  c.vfov=spec.vfov[0]+(spec.vfov[1]-spec.vfov[0])*z;
  c.res=spec.res;
  c.range=Math.max(5,spec.irRange*(0.25+0.75*z));
}
function setModel(model){var c=getCam(selId);if(!c)return;c.model=model;c.zoom=0;
  if(model==='fisheye-12MP')c.type='fisheye';else if(model==='generic-ptz')c.type='ptz';else c.type='fixed';
  applySpec(c);hcache=null;updateCtrl();updateUI();render();if(window.update3D)update3D()}
function setZoom(z){var c=getCam(selId);if(!c)return;c.zoom=z;applySpec(c);hcache=null;updateCtrl();updateUI();render();if(window.update3D)update3D()}

function walkable(x,y){
  for(var i=0;i<BOARDS.length;i++){
    var b=BOARDS[i];
    if(b.t==='rect'){if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)return false}
    else if(b.t==='poly'){var inside=false,pts=b.pts,n=pts.length;for(var j=0,k=n-1;j<n;k=j++){if((pts[j][1]>y)!==(pts[k][1]>y)&&x<(pts[k][0]-pts[j][0])*(y-pts[j][1])/(pts[k][1]-pts[j][1])+pts[j][0])inside=!inside}if(inside)return false}
  }
  return x>=0&&x<=ROOM.W&&y>=0&&y<=ROOM.H;
}
function covAt(px,py,arr){
  arr=arr||cams;var maxPPF=0;
  for(var i=0;i<arr.length;i++){
    var c=arr[i],dx=px-c.x,dy=py-c.y,gd=Math.sqrt(dx*dx+dy*dy),td=Math.sqrt(gd*gd+c.height*c.height);
    var eff=c.type==='fisheye'?Math.max(c.height*1.3,c.range*0.65):c.range;
    if(gd>eff)continue;
    // 수평 각도 체크
    var ad=Math.atan2(dy,dx)*180/Math.PI-c.angle;while(ad>180)ad-=360;while(ad<-180)ad+=360;
    if(Math.abs(ad)>c.fov/2)continue;
    // 수직 각도 체크 (틸트 반영)
    var vertAngle=-Math.atan2(c.height,gd)*180/Math.PI; // 바닥 방향 = 음수
    var tilt=c.tilt||0;
    var vfov=c.vfov||c.fov*0.56;
    if(c.type!=='fisheye'){
      var vertDiff=vertAngle-tilt;
      if(Math.abs(vertDiff)>vfov/2)continue;
    }
    var dd=Math.abs(vertAngle);
    var dF=(dd>=18&&dd<=57)?1:(dd>57?Math.max(.2,1-(dd-57)/50):Math.max(.05,dd/18));
    var fF=Math.cos(ad*Math.PI/180*.75);
    // 수직 오프액시스 감쇠
    var vDiff=c.type!=='fisheye'?vertAngle-tilt:0;
    var vF=Math.cos((vDiff)*Math.PI/180*.75);
    var ppf=(c.res*1200)/(td*td*.18+1)*dF*fF*vF;if(ppf>maxPPF)maxPPF=ppf;
  }
  return maxPPF;
}
function evaluate(arr){
  arr=arr||cams;if(arr.length===0)return{op:0,grid:0,face:0,total:0,opDetail:[]};
  var opDetail=[],opSum=0;
  for(var i=0;i<OPS.length;i++){
    var o=OPS[i],ppf=covAt(o.x,o.y,arr);
    var s=ppf>=55?1:ppf>=18?.5+.5*(ppf-18)/37:ppf>0?.1:0;
    if(o.path){var ps=0;for(var j=0;j<o.path.length;j++){var pp=covAt(o.path[j][0],o.path[j][1],arr);ps+=pp>=18?1:pp>0?.2:0}s=s*.6+(ps/o.path.length)*.4}
    opDetail.push({id:o.id,ppf:ppf,score:s,face:ppf>=55,gest:ppf>=18});opSum+=s;
  }
  var op=opSum/OPS.length,tot=0,gestN=0,faceN=0;
  for(var x=.25;x<ROOM.W;x+=.5)for(var y=.25;y<ROOM.H;y+=.5){if(!walkable(x,y))continue;tot++;var p=covAt(x,y,arr);if(p>=18)gestN++;if(p>=55)faceN++}
  var grid=tot>0?gestN/tot:0,face=tot>0?faceN/tot:0;
  return{op:op,grid:grid,face:face,total:op*.5+grid*.4+face*.1,opDetail:opDetail};
}

var playing=false,playT=0,playSpeeds=[1,2,4,0.5],playSpIdx=0,playRaf=null,playLast=0;
var PLAY_DUR=63; // 63분 훈련 → 63초로 재생
var opAnim=null; // [{x,y},...] 현재 애니메이션 위치

function getOpPos(op,t){
  if(!op.path||op.path.length<2)return{x:op.x,y:op.y};
  var total=op.path.length-1;
  var ft=t*total; // 0~total 사이의 float index
  var idx=Math.min(Math.floor(ft),total-1);
  var frac=ft-idx;
  var a=op.path[idx],b=op.path[Math.min(idx+1,total)];
  return{x:a[0]+(b[0]-a[0])*frac, y:a[1]+(b[1]-a[1])*frac};
}

function playToggle(){
  playing=!playing;
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  if(playing){playLast=performance.now();playLoop()}
  else{if(playRaf)cancelAnimationFrame(playRaf)}
}
function playLoop(){
  if(!playing)return;
  var now=performance.now(),dt=(now-playLast)/1000;
  playLast=now;
  playT+=dt*playSpeeds[playSpIdx]/PLAY_DUR;
  if(playT>=1){playT=0} // 루프
  document.getElementById('playSlider').value=Math.round(playT*1000);
  var mins=Math.floor(playT*PLAY_DUR);
  var secs=Math.floor((playT*PLAY_DUR-mins)*60);
  document.getElementById('playTime').textContent=mins+':'+(secs<10?'0':'')+secs;
  // 운전원 위치 업데이트
  opAnim=[];
  for(var i=0;i<OPS.length;i++){opAnim.push(getOpPos(OPS[i],playT))}
  render();
  if(window.update3DOps)update3DOps();
  playRaf=requestAnimationFrame(playLoop);
}
function playSeek(t){
  playT=t;
  var mins=Math.floor(playT*PLAY_DUR);
  var secs=Math.floor((playT*PLAY_DUR-mins)*60);
  document.getElementById('playTime').textContent=mins+':'+(secs<10?'0':'')+secs;
  opAnim=[];
  for(var i=0;i<OPS.length;i++){opAnim.push(getOpPos(OPS[i],playT))}
  render();if(window.update3DOps)update3DOps();
}
function playSpeed(){
  playSpIdx=(playSpIdx+1)%playSpeeds.length;
  document.getElementById('playSpd').textContent=playSpeeds[playSpIdx]+'x';
}

// 카메라→타겟 방향 계산
function angleToward(cx,cy,tx,ty){return Math.atan2(ty-cy,tx-cx)*180/Math.PI}

// 검증된 배치 템플릿 (실제 제어실 CCTV 설계 기준)
var TEMPLATES={
  4:[
    // 후면 양쪽 코너에서 보드 방향 + 전면 양쪽에서 운전석 방향
    [{x:.3,y:12.7,aim:[4.5,2]},{x:8.7,y:12.7,aim:[4.5,2]},{x:.3,y:.3,aim:[4.5,6]},{x:8.7,y:.3,aim:[4.5,6]}],
    // 후면 중앙 어안 + 좌우벽 + 전면 중앙
    [{x:4.5,y:12.7,aim:[4.5,4],tp:'fisheye'},{x:.3,y:4,aim:[4.5,3]},{x:8.7,y:4,aim:[4.5,3]},{x:4.5,y:.3,aim:[4.5,6]}],
  ],
  5:[
    [{x:.3,y:12.7,aim:[3,2]},{x:8.7,y:12.7,aim:[6,2]},{x:.3,y:.3,aim:[3,5]},{x:8.7,y:.3,aim:[6,5]},{x:4.5,y:6.5,aim:[4.5,2],tp:'fisheye'}],
    [{x:.3,y:12.7,aim:[4,2]},{x:8.7,y:12.7,aim:[5,2]},{x:4.5,y:.3,aim:[4.5,6]},{x:.3,y:4,aim:[4.5,2]},{x:8.7,y:4,aim:[4.5,2]}],
  ],
  6:[
    [{x:.3,y:12.7,aim:[2.5,2]},{x:8.7,y:12.7,aim:[6.5,2]},{x:.3,y:.3,aim:[3,5]},{x:8.7,y:.3,aim:[6,5]},{x:4.5,y:.3,aim:[4.5,6]},{x:4.5,y:12.7,aim:[4.5,3],tp:'fisheye'}],
  ],
  7:[
    [{x:.3,y:12.7,aim:[2.5,2]},{x:8.7,y:12.7,aim:[6.5,2]},{x:.3,y:.3,aim:[3,5]},{x:8.7,y:.3,aim:[6,5]},{x:4.5,y:.3,aim:[4.5,8]},{x:4.5,y:12.7,aim:[4.5,3],tp:'fisheye'},{x:4.5,y:6.5,aim:[4.5,2],tp:'fisheye'}],
  ],
  8:[
    [{x:.3,y:12.7,aim:[2,2]},{x:8.7,y:12.7,aim:[7,2]},{x:.3,y:.3,aim:[2.5,5]},{x:8.7,y:.3,aim:[6.5,5]},{x:4.5,y:.3,aim:[4.5,6]},{x:4.5,y:12.7,aim:[4.5,3]},{x:.3,y:6,aim:[4.5,3],tp:'fisheye'},{x:8.7,y:6,aim:[4.5,3],tp:'fisheye'}],
  ]
};

function makeCam(tpl,id,typeMode){
  var tp=tpl.tp||'fixed';
  if(typeMode==='fisheye')tp='fisheye';
  else if(typeMode==='fixed')tp='fixed';
  var model=tp==='fisheye'?'fisheye-12MP':tp==='ptz'?'generic-ptz':'INI-BN804TI';
  var spec=CAM_SPECS[model];
  var angle=angleToward(tpl.x,tpl.y,tpl.aim[0],tpl.aim[1]);
  return{id:id,type:tp,x:tpl.x,y:tpl.y,angle:angle,
    fov:spec.hfov[0],vfov:spec.vfov[0],range:spec.irRange*0.25,
    height:3.8,res:spec.res,tilt:-30,zoom:0,model:model};
}

function optimizePlacement(arr){
  // 좌표 강하 최적화 — 위치+방향+높이
  for(var iter=0;iter<50;iter++){
    var step=iter<20?.3:iter<35?.12:.04;
    for(var i=0;i<arr.length;i++){
      var c=arr[i],baseScore=evaluate(arr).total;
      ['x','y','angle','height','tilt'].forEach(function(prop){
        var d=prop==='angle'?15:prop==='height'?.12:prop==='tilt'?5:step;
        var orig=c[prop]||(prop==='tilt'?-30:0);
        // +d 시도
        c[prop]=orig+d;
        if(prop==='x')c[prop]=Math.max(0.1,Math.min(ROOM.W-0.1,c[prop]));
        if(prop==='y')c[prop]=Math.max(0.1,Math.min(ROOM.H-0.1,c[prop]));
        if(prop==='height')c[prop]=Math.max(2.5,Math.min(3.9,c[prop]));
        if(prop==='tilt')c[prop]=Math.max(-80,Math.min(-5,c[prop]));
        var s1=evaluate(arr).total;
        // -d 시도
        c[prop]=orig-d;
        if(prop==='x')c[prop]=Math.max(0.1,Math.min(ROOM.W-0.1,c[prop]));
        if(prop==='y')c[prop]=Math.max(0.1,Math.min(ROOM.H-0.1,c[prop]));
        if(prop==='height')c[prop]=Math.max(2.5,Math.min(3.9,c[prop]));
        if(prop==='tilt')c[prop]=Math.max(-80,Math.min(-5,c[prop]));
        var s2=evaluate(arr).total;
        // 최선 선택
        if(s1>=s2&&s1>baseScore){c[prop]=orig+d}
        else if(s2>baseScore){c[prop]=orig-d}
        else{c[prop]=orig}
        if(prop==='x')c[prop]=Math.max(0.1,Math.min(ROOM.W-0.1,c[prop]));
        if(prop==='y')c[prop]=Math.max(0.1,Math.min(ROOM.H-0.1,c[prop]));
        if(prop==='height')c[prop]=Math.max(2.5,Math.min(3.9,c[prop]));
        if(prop==='tilt')c[prop]=Math.max(-80,Math.min(-5,c[prop]));
      });
    }
  }
  return arr;
}

function autoPlace(){
  var statusEl=document.getElementById('optStatus');
  statusEl.textContent='최적화 중...';

  setTimeout(function(){
    var n=optCamNum,tm=optCamType;
    var templates=TEMPLATES[n]||TEMPLATES[4];
    var best=null,bestScore=-1;

    // 각 템플릿 기반 최적화
    for(var t=0;t<templates.length;t++){
      var arr=templates[t].map(function(tpl,i){return makeCam(tpl,900+i,tm)});
      arr=optimizePlacement(arr);
      var s=evaluate(arr).total;
      if(s>bestScore){bestScore=s;best=arr}
    }

    // 랜덤 조합도 시도 (템플릿 보완)
    var spots=[{x:.3,y:.3},{x:8.7,y:.3},{x:.3,y:12.7},{x:8.7,y:12.7},{x:4.5,y:.3},{x:4.5,y:12.7},{x:.3,y:4},{x:8.7,y:4},{x:.3,y:8},{x:8.7,y:8},{x:4.5,y:6.5}];
    for(var trial=0;trial<30;trial++){
      var arr=[];
      for(var i=0;i<n;i++){
        var sp=spots[Math.floor(Math.random()*spots.length)];
        var tp=tm==='fisheye'?'fisheye':tm==='fixed'?'fixed':(['fisheye','fixed','ptz'])[Math.floor(Math.random()*3)];
        var mdl=tp==='fisheye'?'fisheye-12MP':tp==='ptz'?'generic-ptz':'INI-BN804TI';
        var sp2=CAM_SPECS[mdl];
        var cx=sp.x+(.5-Math.random())*.4,cy=sp.y+(.5-Math.random())*.4;
        cx=Math.max(0.1,Math.min(ROOM.W-0.1,cx));cy=Math.max(0.1,Math.min(ROOM.H-0.1,cy));
        arr.push({id:900+i,type:tp,x:cx,y:cy,angle:angleToward(cx,cy,4.5,4),
          fov:sp2.hfov[0],vfov:sp2.vfov[0],range:sp2.irRange*0.25,height:3.8,
          res:sp2.res,tilt:-30,zoom:0,model:mdl});
      }
      arr=optimizePlacement(arr);
      var s=evaluate(arr).total;
      if(s>bestScore){bestScore=s;best=arr}
    }

    cams=[];
    best.forEach(function(c){cams.push({id:nextId++,type:c.type,x:c.x,y:c.y,angle:c.angle,fov:c.fov,vfov:c.vfov||c.fov*.56,range:c.range,height:c.height,res:c.res,tilt:c.tilt||-30,zoom:c.zoom||0,model:c.model||'INI-BN804TI'})});

    selId=cams[0].id;hcache=null;updateUI();render();if(window.update3D)update3D();
    statusEl.textContent='완료: '+Math.round(bestScore*100)+'% ('+cams.length+'대)';
  },50);
}

// ── 2D 렌더링 ──
var cv,ctx,PAD=40,SCALE=1;
function w2s(wx,wy){return{x:PAD+wx*SCALE,y:PAD+wy*SCALE}}
function s2w(sx,sy){return{x:(sx-PAD)/SCALE,y:(sy-PAD)/SCALE}}

function resize(){
  var el=document.getElementById('pane2d');if(!el||el.style.display==='none')return;
  var dpr=window.devicePixelRatio||1;
  cv.width=el.clientWidth*dpr;cv.height=el.clientHeight*dpr;
  cv.style.width=el.clientWidth+'px';cv.style.height=el.clientHeight+'px';
  var sx=(cv.width/dpr-PAD*2)/ROOM.W,sy=(cv.height/dpr-PAD*2)/ROOM.H;
  SCALE=Math.min(sx,sy);hcache=null;render();
}

function render(){
  if(!ctx)return;
  var dpr=window.devicePixelRatio||1;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  var lw=cv.width/dpr,lh=cv.height/dpr;
  ctx.clearRect(0,0,lw,lh);ctx.fillStyle='#0f1420';ctx.fillRect(0,0,lw,lh);

  // 히트맵
  if(vis.heat&&cams.length>0){
    if(!hcache){hcache=[];var S=.4;for(var x=0;x<ROOM.W;x+=S)for(var y=0;y<ROOM.H;y+=S){if(!walkable(x+S/2,y+S/2))continue;var ppf=covAt(x+S/2,y+S/2);if(ppf>0)hcache.push({x:x,y:y,ppf:ppf})}}
    for(var i=0;i<hcache.length;i++){var h=hcache[i],p1=w2s(h.x,h.y),sz=.4*SCALE,ppf=h.ppf,a=Math.min(.5,ppf/100*.4+.1);
      ctx.fillStyle=ppf>=55?'rgba(16,185,129,'+a+')':ppf>=18?'rgba(59,130,246,'+a+')':'rgba(245,158,11,'+a+')';ctx.fillRect(p1.x,p1.y,sz,sz)}
  }
  // 사각지대
  if(vis.dead&&cams.length>0){for(var x=0;x<ROOM.W;x+=.5)for(var y=0;y<ROOM.H;y+=.5){if(!walkable(x+.25,y+.25))continue;if(covAt(x+.25,y+.25)<5){var p1=w2s(x,y);ctx.fillStyle='rgba(239,68,68,0.18)';ctx.fillRect(p1.x,p1.y,.5*SCALE,.5*SCALE)}}}

  // 외곽+그리드
  var r0=w2s(0,0),r1=w2s(ROOM.W,ROOM.H);
  ctx.strokeStyle='#1e2a40';ctx.lineWidth=.5;
  for(var x=1;x<ROOM.W;x++){var p=w2s(x,0),p2=w2s(x,ROOM.H);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.stroke()}
  for(var y=1;y<ROOM.H;y++){var p=w2s(0,y),p2=w2s(ROOM.W,y);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.stroke()}
  ctx.strokeStyle='#3b5580';ctx.lineWidth=1.5;ctx.strokeRect(r0.x,r0.y,r1.x-r0.x,r1.y-r0.y);

  // 가구
  for(var i=0;i<BOARDS.length;i++){var b=BOARDS[i],isB=b.cat==='board';ctx.fillStyle=isB?'rgba(30,42,58,0.8)':'rgba(26,34,52,0.9)';ctx.strokeStyle=isB?'#3b5580':'#2a3a52';ctx.lineWidth=1;
    if(b.t==='rect'){var p=w2s(b.x,b.y),w=b.w*SCALE,h=b.h*SCALE;ctx.fillRect(p.x,p.y,w,h);ctx.strokeRect(p.x,p.y,w,h);ctx.fillStyle='#475569';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(b.label,p.x+w/2,p.y+h/2+3)}
    else if(b.t==='poly'){ctx.beginPath();for(var j=0;j<b.pts.length;j++){var p=w2s(b.pts[j][0],b.pts[j][1]);j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)}ctx.closePath();ctx.fill();ctx.stroke()}}

  // 운전원
  for(var i=0;i<OPS.length;i++){var o=OPS[i];
    var ox=opAnim?opAnim[i].x:o.x, oy=opAnim?opAnim[i].y:o.y;
    var p=w2s(ox,oy);
    // 동선 경로 (전체 / 이동 궤적)
    if(o.path){
      if(vis.ops||opAnim){ctx.strokeStyle=o.col+'30';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();var pp=w2s(o.path[0][0],o.path[0][1]);ctx.moveTo(pp.x,pp.y);for(var j=1;j<o.path.length;j++){pp=w2s(o.path[j][0],o.path[j][1]);ctx.lineTo(pp.x,pp.y)}ctx.stroke();ctx.setLineDash([])}
      // 재생 중: 이동 궤적 하이라이트
      if(opAnim&&o.path.length>1){
        var total=o.path.length-1,ft=playT*total,idx=Math.min(Math.floor(ft),total-1);
        ctx.strokeStyle=o.col+'90';ctx.lineWidth=2;ctx.beginPath();
        var pp0=w2s(o.path[0][0],o.path[0][1]);ctx.moveTo(pp0.x,pp0.y);
        for(var j=1;j<=idx;j++){var pp2=w2s(o.path[j][0],o.path[j][1]);ctx.lineTo(pp2.x,pp2.y)}
        ctx.lineTo(p.x,p.y);ctx.stroke();
      }
    }
    // 운전원 점
    ctx.beginPath();ctx.arc(p.x,p.y,opAnim?6:5,0,Math.PI*2);ctx.fillStyle=o.col;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    // 재생 중 글로우 효과
    if(opAnim){ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.strokeStyle=o.col+'40';ctx.lineWidth=2;ctx.stroke()}
    ctx.fillStyle='#fff';ctx.font='bold 8px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(o.id,p.x,p.y-10)}

  // 카메라
  for(var i=0;i<cams.length;i++){var c=cams[i],p=w2s(c.x,c.y),t=CAM_TYPES[c.type],isSel=c.id===selId;
    var aR=c.angle*Math.PI/180,fR=c.fov*Math.PI/180,eff=c.type==='fisheye'?Math.max(c.height*1.3,c.range*.65):c.range;
    // 틸트 기반 근거리/원거리 계산
    var tiltAbs=Math.abs(c.tilt||0),vfovH=(c.vfov||c.fov*.56)/2;
    var downNear=tiltAbs+vfovH,downFar=tiltAbs-vfovH;
    var nearDist=(downNear>0&&downNear<90)?c.height/Math.tan(downNear*Math.PI/180):0.1;
    var farDist=(downFar>1)?Math.min(c.height/Math.tan(downFar*Math.PI/180),eff):eff;
    nearDist=Math.max(0.1,Math.min(nearDist,eff));farDist=Math.min(farDist,eff);
    if(c.type==='fisheye'){nearDist=0.1;farDist=eff} // 어안은 기존대로
    var nearPx=nearDist*SCALE,farPx=farDist*SCALE;
    // 도넛 섹터(annular sector) 그리기
    ctx.beginPath();ctx.arc(p.x,p.y,farPx,aR-fR/2,aR+fR/2,false);ctx.arc(p.x,p.y,nearPx,aR+fR/2,aR-fR/2,true);ctx.closePath();
    ctx.fillStyle=t.col+(isSel?'25':'12');ctx.fill();ctx.strokeStyle=t.col+(isSel?'70':'35');ctx.lineWidth=isSel?1.5:.7;ctx.stroke();
    // 카메라→운전원 커버리지 라인
    for(var j=0;j<OPS.length;j++){var o=OPS[j],ppf=covAt(o.x,o.y,[c]);if(ppf>=18){var op=w2s(o.x,o.y);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(op.x,op.y);ctx.strokeStyle=ppf>=55?'rgba(16,185,129,0.3)':'rgba(59,130,246,0.2)';ctx.lineWidth=ppf>=55?1.5:1;ctx.setLineDash([3,4]);ctx.stroke();ctx.setLineDash([])}}
    ctx.beginPath();ctx.arc(p.x,p.y,isSel?4:3,0,Math.PI*2);ctx.fillStyle=t.col;ctx.fill();if(isSel){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke()}
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(aR)*12,p.y+Math.sin(aR)*12);ctx.strokeStyle=t.col;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 8px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('#'+c.id,p.x,p.y-7)}

  // 스케일바
  var sb=w2s(ROOM.W-2,ROOM.H-.2),se=w2s(ROOM.W,ROOM.H-.2);ctx.strokeStyle='#64748b';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sb.x,sb.y);ctx.lineTo(se.x,se.y);ctx.stroke();ctx.fillStyle='#64748b';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('2m',(sb.x+se.x)/2,sb.y-3);
}

// ── 마우스 ──
function setupEvents(){
  cv.addEventListener('mousedown',function(e){
    var w=s2w(e.offsetX,e.offsetY);
    if(e.button===2){for(var i=cams.length-1;i>=0;i--)if(Math.hypot(cams[i].x-w.x,cams[i].y-w.y)<.6){drag={cam:cams[i],mode:'rotate',sx:e.offsetX,orig:cams[i].angle};selId=cams[i].id;updateUI();break}return}
    for(var i=cams.length-1;i>=0;i--)if(Math.hypot(cams[i].x-w.x,cams[i].y-w.y)<.6){drag={cam:cams[i],mode:'move',ox:cams[i].x-w.x,oy:cams[i].y-w.y};selId=cams[i].id;updateUI();return}
  });
  cv.addEventListener('mousemove',function(e){if(!drag)return;if(drag.mode==='move'){var w=s2w(e.offsetX,e.offsetY);drag.cam.x=Math.max(0.1,Math.min(ROOM.W-0.1,w.x+drag.ox));drag.cam.y=Math.max(0.1,Math.min(ROOM.H-0.1,w.y+drag.oy))}else{drag.cam.angle=(drag.orig+(e.offsetX-drag.sx))%360;if(drag.cam.angle<0)drag.cam.angle+=360}hcache=null;render()});
  cv.addEventListener('mouseup',function(){if(drag){drag=null;hcache=null;updateUI();render();if(window.update3D)update3D()}});
  cv.addEventListener('dblclick',function(e){var w=s2w(e.offsetX,e.offsetY);if(w.x>=0.1&&w.x<=ROOM.W-0.1&&w.y>=0.1&&w.y<=ROOM.H-0.1)addCam(w.x,w.y,'fixed')});
  cv.addEventListener('contextmenu',function(e){e.preventDefault()});
  // 터치 이벤트 (모바일)
  var lastTap=0;
  cv.addEventListener('touchstart',function(e){
    e.preventDefault();var t=e.touches[0],rect=cv.getBoundingClientRect();
    var ox=t.clientX-rect.left,oy=t.clientY-rect.top,w=s2w(ox,oy);
    var now=Date.now();
    if(now-lastTap<300){if(w.x>=0.1&&w.x<=ROOM.W-0.1&&w.y>=0.1&&w.y<=ROOM.H-0.1)addCam(w.x,w.y,'fixed');lastTap=0;return}
    lastTap=now;
    for(var i=cams.length-1;i>=0;i--)if(Math.hypot(cams[i].x-w.x,cams[i].y-w.y)<.8){drag={cam:cams[i],mode:'move',ox:cams[i].x-w.x,oy:cams[i].y-w.y};selId=cams[i].id;updateUI();return}
  },{passive:false});
  cv.addEventListener('touchmove',function(e){
    e.preventDefault();if(!drag)return;var t=e.touches[0],rect=cv.getBoundingClientRect();
    var ox=t.clientX-rect.left,oy=t.clientY-rect.top,w=s2w(ox,oy);
    drag.cam.x=Math.max(0.1,Math.min(ROOM.W-0.1,w.x+drag.ox));drag.cam.y=Math.max(0.1,Math.min(ROOM.H-0.1,w.y+drag.oy));
    hcache=null;render();
  },{passive:false});
  cv.addEventListener('touchend',function(e){if(drag){drag=null;hcache=null;updateUI();render();if(window.update3D)update3D()}});
  window.addEventListener('resize',function(){resize()});
}

function toggleSide(){
  var p=document.getElementById('sidePanel'),o=document.getElementById('sideOverlay');
  var open=p.classList.toggle('open');o.classList.toggle('open',open);
}
function showPov(){
  if(!selId)return;
  // 3D 뷰가 보이도록 전환
  if(curView==='2d')setView('split');
  try{var f=document.getElementById('f3d');if(f.contentWindow.enterPovFromParent)f.contentWindow.enterPovFromParent(selId)}catch(e){}
}

cv=document.getElementById('cv');ctx=cv.getContext('2d');
setupEvents();
var isMobile=window.innerWidth<=768;
setView(isMobile?'2d':'split');
setTimeout(function(){autoPlace()},100);
</script>

<!-- 3D: iframe이 parent.ROOM/cams 등을 직접 참조 -->
<script>
(function(){
  var f3d=document.getElementById('f3d');
  window.update3D=function(){
    try{if(f3d.contentWindow.updateCams)f3d.contentWindow.updateCams()}catch(e){}
  };
  window.update3DOps=function(){
    try{if(f3d.contentWindow.updateOps)f3d.contentWindow.updateOps(window.opAnim)}catch(e){}
  };
  window.resize3D=function(){};
})();
</script>
